<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Check-in OlasDelSur</title>
<link rel="stylesheet" href="./fonts.css">
<style>
  :root{ --ocean:#0096A6; --ocean2:#00B4C8; --coral:#FF6B35; --coral2:#FF8C5A; --gold:#F2A30F;
         --navy:#1E3A5F; --cream:#FFE8B0; --sand:#fcecd2; --card:#ffffff; --ink:#2D1A0E;
         --mut:#A07850; --line:rgba(210,150,80,0.30); --ok:#3D9970;
         --radius:18px; --shadow:0 8px 32px rgba(210,100,30,0.15);
         --font:'DM Sans',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         --display:'Playfair Display',Georgia,serif; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:var(--font); background:var(--sand); color:var(--ink); -webkit-text-size-adjust:100%; }
  header{ padding:10px 14px; background:var(--navy); color:var(--cream);
          display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 12px rgba(0,0,0,.12); }
  .brand{ display:flex; align-items:center; gap:11px; }
  .brand .logo{ height:38px; width:38px; border-radius:50%; object-fit:cover;
                box-shadow:0 2px 8px rgba(0,0,0,.35); background:#fff; }
  header .ttl{ font-family:var(--display); font-size:18px; font-weight:700; color:#fff; letter-spacing:.2px; }
  .lang{ position:relative; }
  .langsel{ display:flex; align-items:center; gap:5px; background:rgba(255,255,255,.14);
        border:1px solid rgba(255,255,255,.22); padding:7px 10px; border-radius:10px; font-size:19px; color:#fff; }
  .langsel .caret{ font-size:11px; opacity:.85; }
  .langmenu{ position:absolute; right:0; top:calc(100% + 6px); background:#fff; border-radius:12px;
        box-shadow:0 10px 30px rgba(0,0,0,.28); overflow:hidden; min-width:165px; z-index:30; }
  .langmenu[hidden]{ display:none; }
  .langmenu button{ display:flex; width:100%; gap:10px; align-items:center; background:#fff; border:0;
        padding:11px 14px; font-size:15px; color:var(--ink); text-align:left; font-family:var(--font); cursor:pointer; }
  .langmenu button:hover, .langmenu button.on{ background:#f3ece0; }
  .priv{ font-size:14px; line-height:1.35; padding:11px 16px; background:var(--ocean); color:#fff; }
  .priv b{ color:var(--cream); }
  main{ max-width:520px; margin:0 auto; padding:13px; }
  .steps{ display:flex; gap:6px; margin-bottom:10px; }
  .steps .s{ flex:1; height:6px; border-radius:6px; background:#ecdcc0; transition:background .3s; }
  .steps .s.on{ background:linear-gradient(90deg,var(--coral),var(--coral2)); }
  .screen{ display:none; }
  .screen.on{ display:block; }
  h1{ font-family:var(--display); font-size:21px; font-weight:700; margin:2px 0 5px; color:var(--navy); }
  .sub{ color:#6f5436; font-size:13.5px; margin:0 0 13px; line-height:1.4; }
  /* scanner */
  .scanlabel{ font-size:13px; color:var(--mut); text-align:center; margin:0 0 10px; }
  /* fessura-scanner: si inquadra SOLO il codice MRZ */
  .slot{ position:relative; width:100%; aspect-ratio:3/1; background:#000; border-radius:14px;
         overflow:hidden; box-shadow:0 6px 20px rgba(27,108,168,.25); }
  .slot video{ width:100%; height:100%; object-fit:cover; }
  .frame{ position:absolute; inset:0; pointer-events:none; }
  .corner{ position:absolute; width:26px; height:26px; border:3px solid #fff; opacity:.95; }
  .corner.tl{ top:9px; left:9px; border-right:0; border-bottom:0; border-radius:7px 0 0 0; }
  .corner.tr{ top:9px; right:9px; border-left:0; border-bottom:0; border-radius:0 7px 0 0; }
  .corner.bl{ bottom:9px; left:9px; border-right:0; border-top:0; border-radius:0 0 0 7px; }
  .corner.br{ bottom:9px; right:9px; border-left:0; border-top:0; border-radius:0 0 7px 0; }
  .scanline{ position:absolute; left:7%; right:7%; height:2px;
             background:linear-gradient(90deg,transparent,#ff6f5e,transparent);
             box-shadow:0 0 10px 1px #ff6f5e; animation:scan 2.1s ease-in-out infinite; }
  @keyframes scan{ 0%{top:16%} 50%{top:84%} 100%{top:16%} }
  /* card + fields */
  .card{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:15px;
         margin-bottom:12px; box-shadow:var(--shadow); }
  .card.read{ background:linear-gradient(180deg,#f4fbf6,#ffffff); border-color:#c4e6d0; }
  .card h2{ font-size:12.5px; margin:0 0 14px; text-transform:uppercase; letter-spacing:.06em; font-weight:700;
            color:var(--ocean); display:flex; align-items:center; gap:8px; }
  .card h2::before{ content:""; width:7px; height:7px; border-radius:50%; background:var(--ocean); flex:none; }
  .card.read h2{ color:var(--ok); } .card.read h2::before{ background:var(--ok); }
  .fld{ margin-bottom:11px; }
  .fld:last-child{ margin-bottom:0; }
  label{ display:block; font-size:13px; color:#7a5a36; margin-bottom:5px; font-weight:600; }
  label .req{ color:var(--coral); }
  input,select{ width:100%; padding:12px 13px; border:1.5px solid var(--line); border-radius:12px; font-size:16px;
        background:#fff; color:var(--ink); font-family:var(--font); transition:border-color .15s, box-shadow .15s; }
  input:focus,select:focus{ outline:none; border-color:var(--ocean); box-shadow:0 0 0 3px rgba(0,150,166,.15); }
  input.bad,select.bad{ border-color:var(--coral); background:#fff5f1; }
  input.locked,select.locked{ background:#eef7f1; border-color:#bfe0c8; color:#23423a;
        -webkit-text-fill-color:#23423a; opacity:1; font-weight:600; }
  .lockhint{ font-size:12px; color:#2c6b48; background:#e9f7ee; border:1px solid #c4e6d0;
             padding:9px 11px; border-radius:11px; margin-top:12px; line-height:1.4; }
  .err{ color:var(--coral); font-size:12px; margin-top:4px; display:none; }
  .err.show{ display:block; }
  .two{ display:flex; gap:10px; } .two>*{ flex:1; }
  .phone{ display:flex; gap:8px; } .phone .pref{ flex:0 0 92px; }
  .chk{ display:flex; gap:11px; align-items:flex-start; font-size:13.5px; color:var(--ink); line-height:1.4; }
  .chk input{ width:22px; height:22px; flex:none; margin-top:1px; accent-color:var(--ocean); }
  .hint{ font-size:12px; color:var(--mut); margin-top:5px; }
  .copybtn{ background:#eef5fb; color:var(--ocean); border:1px solid #cfe2f2; border-radius:8px; padding:8px 10px; font-size:12.5px; font-weight:600; margin-bottom:12px; width:100%; }
  /* buttons / nav */
  .nav{ display:flex; gap:10px; margin-top:8px; }
  button.act{ flex:1; padding:13px; border:0; border-radius:13px; font-size:15.5px; font-weight:700; color:#fff;
              font-family:var(--font); background:linear-gradient(135deg,var(--coral),var(--coral2));
              box-shadow:0 6px 18px rgba(255,107,53,.30); }
  button.ghost{ background:#efe2cb; color:var(--ink); flex:0 0 38%; box-shadow:none; }
  button.act:disabled{ opacity:.5; box-shadow:none; }
  #status{ font-size:13px; padding:11px 13px; border-radius:12px; background:#fff; border:1px solid var(--line); margin-top:12px; min-height:20px; color:var(--ink); }
  #status.ok{ background:#eaf7ef; border-color:#bfe0c8; } #status.warn{ background:#fff4e3; border-color:#f0c47a; }
  .review .row{ display:flex; justify-content:space-between; gap:12px; padding:11px 0; border-bottom:1px solid var(--line); font-size:14px; }
  .review .row:last-child{ border-bottom:0; }
  .review .row .k{ color:var(--mut); } .review .row .v{ font-weight:700; text-align:right; color:var(--navy); }
  .done{ text-align:center; padding:44px 14px; }
  .done .big{ width:88px; height:88px; margin:0 auto 16px; border-radius:50%;
              background:linear-gradient(135deg,var(--ocean),var(--ocean2)); color:#fff; font-size:46px;
              display:flex; align-items:center; justify-content:center; box-shadow:0 10px 28px rgba(0,150,166,.35); }
  pre{ white-space:pre-wrap; word-break:break-all; background:#101820; color:#7CFC9B; padding:10px; border-radius:8px; font-size:11px; }
  details{ margin-top:12px; font-size:12px; color:#7a7060; }
</style>
</head>
<body>
<header>
  <div class="brand">
    <img class="logo" src="./logo.png" alt="OlasDelSur">
    <span class="ttl">OlasDelSur · Check-in</span>
  </div>
  <div class="lang" id="langwrap">
    <button class="langsel" id="langbtn" aria-haspopup="listbox" aria-expanded="false" aria-label="Idioma / Language">
      <span id="curflag">🇪🇸</span><span class="caret">▾</span>
    </button>
    <div class="langmenu" id="langmenu" hidden role="listbox">
      <button data-l="es">🇪🇸 Español</button>
      <button data-l="en">🇬🇧 English</button>
      <button data-l="fr">🇫🇷 Français</button>
      <button data-l="de">🇩🇪 Deutsch</button>
      <button data-l="it">🇮🇹 Italiano</button>
    </div>
  </div>
</header>
<div class="priv" id="privbar">🔒 <b id="t_priv"></b></div>

<main>
  <div class="steps"><div class="s on" data-st="1"></div><div class="s" data-st="2"></div><div class="s" data-st="3"></div><div class="s" data-st="4"></div></div>

  <!-- STEP 1 — SCANNER -->
  <section class="screen on" id="screen-scan">
    <h1 id="t_scan_h"></h1>
    <p class="sub" id="t_scan_sub"></p>
    <p class="scanlabel" id="t_scanlabel"></p>
    <div class="slot">
      <video id="video" playsinline muted></video>
      <div class="frame">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="scanline" id="scanline" style="display:none"></div>
      </div>
    </div>
    <div class="nav">
      <button class="act" id="startBtn"></button>
    </div>
    <div id="status"></div>
  </section>

  <!-- STEP 2 — CONFIRM MRZ -->
  <section class="screen" id="screen-confirm">
    <h1 id="t_cf_h"></h1>
    <p class="sub" id="t_cf_sub"></p>
    <div class="card read">
      <h2 id="t_cf_card"></h2>
      <div class="fld"><label id="l_nombre"></label><input id="i_nombre"></div>
      <div class="two">
        <div class="fld"><label id="l_ap1"></label><input id="i_ap1"></div>
        <div class="fld"><label id="l_ap2"></label><input id="i_ap2"></div>
      </div>
      <div class="two">
        <div class="fld"><label id="l_sexo"></label>
          <select id="i_sexo"><option value="M">M</option><option value="F">F</option><option value="X">X</option></select></div>
        <div class="fld"><label id="l_dob"></label><input id="i_dob" type="date"></div>
      </div>
      <div class="fld"><label id="l_nac"></label><select id="i_nac"></select></div>
      <div class="two">
        <div class="fld"><label id="l_tdoc"></label><select id="i_tdoc"></select></div>
        <div class="fld"><label id="l_ndoc"></label><input id="i_ndoc"></div>
      </div>
      <div class="lockhint" id="t_lockhint"></div>
    </div>
    <div class="nav">
      <button class="ghost" id="cf_back"></button>
      <button class="act" id="cf_next"></button>
    </div>
  </section>

  <!-- STEP 3 — COMPLETE -->
  <section class="screen" id="screen-complete">
    <h1 id="t_cp_h"></h1>
    <p class="sub" id="t_cp_sub"></p>
    <div class="card">
      <h2 id="t_cp_doc"></h2>
      <div class="fld" id="wrap_soporte">
        <label id="l_soporte"></label><input id="i_soporte">
        <div class="hint" id="h_soporte"></div>
      </div>
    </div>
    <div class="card">
      <h2 id="t_cp_addr"></h2>
      <div class="fld"><label id="l_calle"></label><input id="i_calle">
        <div class="err" id="e_calle"></div></div>
      <div class="two">
        <div class="fld"><label id="l_cp"></label><input id="i_cp" inputmode="numeric">
          <div class="err" id="e_cp"></div></div>
        <div class="fld"><label id="l_ciudad"></label><input id="i_ciudad">
          <div class="err" id="e_ciudad"></div></div>
      </div>
      <div class="two">
        <div class="fld"><label id="l_pais"></label><select id="i_pais"></select></div>
        <div class="fld"><label id="l_prov"></label>
          <input id="i_prov"><select id="i_prov_sel" style="display:none"></select></div>
      </div>
    </div>
    <div class="card">
      <h2 id="t_cp_contact"></h2>
      <div class="fld"><label id="l_tel"></label>
        <div class="phone"><input class="pref" id="i_pref" readonly><input id="i_tel" inputmode="tel"></div>
        <div class="err" id="e_tel"></div></div>
      <div class="fld"><label id="l_email"></label><input id="i_email" type="email" inputmode="email">
        <div class="err" id="e_email"></div></div>
    </div>
    <div class="card">
      <label class="chk"><input type="checkbox" id="i_rgpd"><span id="t_rgpd"></span></label>
      <div class="err" id="e_rgpd"></div>
    </div>
    <div class="nav">
      <button class="ghost" id="cp_back"></button>
      <button class="act" id="cp_next"></button>
    </div>
  </section>

  <!-- STEP 4 — REVIEW -->
  <section class="screen" id="screen-review">
    <h1 id="t_rv_h"></h1>
    <p class="sub" id="t_rv_sub"></p>
    <div class="card review" id="rv_body"></div>
    <div class="nav">
      <button class="ghost" id="rv_back"></button>
      <button class="act" id="rv_send"></button>
    </div>
  </section>

  <!-- DONE -->
  <section class="screen" id="screen-done">
    <div class="done"><div class="big">✓</div><h1 id="t_dn_h"></h1><p class="sub" id="t_dn_sub"></p></div>
  </section>
</main>

<canvas id="work" hidden></canvas>
<script src="./vendor/tesseract.min.js"></script>

/* ============ MRZ scanner (come prototipo) ============ */
const video=$("video"), work=$("work"), statusEl=$("status"), dbg=$("dbg")||{};
let worker=null, stream=null, busy=false, loop=null, found=false, votes={}; const CONFIRM=3;
function setStatus(t,cls){ statusEl.textContent=t; statusEl.className=cls||""; }
function val(c){ if(c>='0'&&c<='9')return c.charCodeAt(0)-48; if(c>='A'&&c<='Z')return c.charCodeAt(0)-55; return 0; }
function cd(s){ const w=[7,3,1]; let x=0; for(let i=0;i<s.length;i++) x+=val(s[i])*w[i%3]; return x%10; }
function ck(s,d){ return String(cd(s))===d; }
function ymd(s){ return s.length===6? `${s.slice(4)}/${s.slice(2,4)}/${s.slice(0,2)}`:s; }
function names(f){ const p=f.split('<<'); return {surname:(p[0]||'').replace(/</g,' ').trim(), given:(p[1]||'').replace(/</g,' ').trim()}; }
function parseTD3(l1,l2){ const dn=l2.slice(0,9),cdn=l2[9],nat=l2.slice(10,13),dob=l2.slice(13,19),cdob=l2[19],
  sex=l2[20],exp=l2.slice(21,27),cexp=l2[27],comp=l2[43];
  const cs=l2.slice(0,10)+l2.slice(13,20)+l2.slice(21,28)+l2.slice(28,43);
  const checks={doc:ck(dn,cdn),dob:ck(dob,cdob),exp:ck(exp,cexp),comp:ck(cs,comp)};
  return {fmt:"TD3",...names(l1.slice(5)),docnum:dn.replace(/</g,''),nat,dob:ymd(dob),sex:sex.replace(/</g,''),checks}; }
function parseTD1(l1,l2,l3){ const dn=l1.slice(5,14),cdn=l1[14],dob=l2.slice(0,6),cdob=l2[6],sex=l2[7],
  exp=l2.slice(8,14),cexp=l2[14],nat=l2.slice(15,18),comp=l2[29],issuer=l1.slice(2,5);
  const cs=l1.slice(5,30)+l2.slice(0,7)+l2.slice(8,15)+l2.slice(18,29);
  const checks={doc:ck(dn,cdn),dob:ck(dob,cdob),exp:ck(exp,cexp),comp:ck(cs,comp)};
  const r={fmt:"TD1",issuer,...names(l3),docnum:dn.replace(/</g,''),nat,dob:ymd(dob),sex:sex.replace(/</g,''),checks};
  // Parser specifico DNI/NIE spagnolo: soporte e NIF sono in campi diversi rispetto allo standard
  if(issuer==="ESP"){
    const soporte=l1.slice(5,14).replace(/</g,'');          // "document number" MRZ = nº de soporte
    const nif=l1.slice(15,30).replace(/</g,'');             // dati opzionali = nº DNI/NIE reale
    const prim=(l3.split('<<')[0]||'');                     // identificatore primario = i due cognomi
    const aps=prim.split('<').filter(Boolean);
    r.es={ soporte, nif,
           ap1:(aps[0]||'').replace(/</g,' ').trim(),
           ap2:(aps.slice(1).join(' ')||'').replace(/</g,' ').trim(),
           tipo:/^[XYZ]/.test(nif)?'NIE':'DNI' };
  }
  return r; }
function mrzLines(t){ return t.toUpperCase().split('\n').map(s=>s.replace(/[^A-Z0-9<]/g,''))
  .filter(s=>s.length>=28&&s.length<=46&&(s.match(/</g)||[]).length>=2); }
function tryParse(t){ const L=mrzLines(t); const l44=L.filter(s=>s.length>=42);
  if(l44.length>=2) return parseTD3(l44[0].padEnd(44,'<').slice(0,44),l44[1].padEnd(44,'<').slice(0,44));
  const l30=L.filter(s=>s.length>=28&&s.length<=32);
  if(l30.length>=3) return parseTD1(...l30.slice(0,3).map(s=>s.padEnd(30,'<').slice(0,30))); return null; }
async function scanOnce(){ if(busy||found) return; busy=true;
  const vw=video.videoWidth,vh=video.videoHeight; if(!vw){busy=false;return;}
  // ritaglia ESATTAMENTE la porzione visibile nella fessura (object-fit: cover)
  const rect=video.getBoundingClientRect();
  const elA=(rect.width&&rect.height)?rect.width/rect.height:3, vA=vw/vh;
  let sx,sy,sw,sh;
  if(vA>elA){ sh=vh; sw=vh*elA; sx=(vw-sw)/2; sy=0; }
  else      { sw=vw; sh=vw/elA; sx=0; sy=(vh-sh)/2; }
  const sc=2; work.width=Math.round(sw*sc); work.height=Math.round(sh*sc);
  const ctx=work.getContext('2d');
  ctx.drawImage(video, sx,sy,sw,sh, 0,0, work.width, work.height);
  const im=ctx.getImageData(0,0,work.width,work.height),d=im.data; let sum=0;
  for(let i=0;i<d.length;i+=4){const g=0.3*d[i]+0.59*d[i+1]+0.11*d[i+2]; d[i]=d[i+1]=d[i+2]=g; sum+=g;}
  const thr=(sum/(d.length/4))*0.92;
  for(let i=0;i<d.length;i+=4){const v=d[i]<thr?0:255; d[i]=d[i+1]=d[i+2]=v;} ctx.putImageData(im,0,0);
  try{ const {data:{text}}=await worker.recognize(work); const r=tryParse(text);
    if(r && Object.values(r.checks).every(Boolean)){
      dbg.textContent=text;
      // consenso multi-frame: i nomi non hanno check-digit -> accetto solo se la
      // stessa lettura (nomi inclusi) si ripete CONFIRM volte. Scarta errori casuali.
      const sig=JSON.stringify([r.fmt,r.given,r.surname,r.docnum,r.dob,r.sex,r.nat,
                                r.es?[r.es.ap1,r.es.ap2,r.es.nif,r.es.soporte]:0]);
      votes[sig]=(votes[sig]||0)+1;
      const n=votes[sig];
      if(n>=CONFIRM){ found=true; stopScan(); onScanned(r); }
      else setStatus(LANG=="es"?`Verificando lectura… (${n}/${CONFIRM}) mantén firme`
                                :`Verifying read… (${n}/${CONFIRM}) hold steady`);
    } else { setStatus(LANG=="es"?"Buscando el código…":"Looking for the code…"); dbg.textContent=text; }
  }catch(e){ setStatus("OCR: "+e.message,"warn"); } busy=false; }
async function startScan(){ setStatus(LANG=="es"?"Iniciando cámara…":"Starting camera…");
  try{ stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}}); }
  catch(e){ setStatus((LANG=="es"?"Cámara no disponible. Abre el enlace en Safari/Chrome. ":"Camera unavailable. Open the link in Safari/Chrome. ")+e.message,"warn"); return; }
  video.srcObject=stream; await video.play();
  setStatus(LANG=="es"?"Cargando modelo MRZ (~11 MB, solo la 1ª vez)…":"Loading MRZ model (~11 MB, first time only)…");
  if(!worker){ worker=await Tesseract.createWorker('mrz',1,{langPath:'.',workerPath:'./vendor/worker.min.js',corePath:'./vendor'});
    await worker.setParameters({tessedit_char_whitelist:'0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ<',tessedit_pageseg_mode:'6'}); }
  found=false; votes={}; setStatus(LANG=="es"?"Escáner activo. Encuadra el código.":"Scanner active. Frame the code.");
  $("scanline").style.display="block";
  loop=setInterval(scanOnce,1200); }
function stopScan(){ clearInterval(loop); loop=null; const sl=$("scanline"); if(sl) sl.style.display="none";
  if(stream){stream.getTracks().forEach(t=>t.stop()); stream=null;} }

/* ============ stato + flusso ============ */
const G={};
function inferYear(yy){ const n=+yy, cur=new Date().getFullYear()%100; return (n<=cur?2000:1900)+n; }
function dobISO(ddmmyy){ const p=ddmmyy.split('/'); if(p.length!=3) return ""; return `${inferYear(p[2])}-${p[1]}-${p[0]}`; }
function onScanned(r){
  G.scan=r;
  // default generico (passaporto / TD1 non-ESP)
  // TD3 = passaporto; TD1 spagnolo (r.es) = DNI/NIE; TD1 straniero = OTRO (niente soporte spagnolo)
  let ap1=r.surname||"", ap2="", ndoc=r.docnum||"", tdoc=(r.fmt==="TD3"?"PASAPORTE":"OTRO"), soporte="";
  if(r.es){ ap1=r.es.ap1; ap2=r.es.ap2; ndoc=r.es.nif; tdoc=r.es.tipo; soporte=r.es.soporte; }
  $("i_nombre").value=r.given||"";
  $("i_ap1").value=ap1; $("i_ap2").value=ap2;
  $("i_sexo").value=(r.sex==="F"?"F":r.sex==="M"?"M":"X");
  $("i_dob").value=dobISO(r.dob);
  const iso=ICAO2ISO[r.nat]||""; if(iso) $("i_nac").value=iso;
  $("i_tdoc").value=tdoc; $("i_ndoc").value=ndoc; $("i_soporte").value=soporte;
  lockConfirm(r);
  showScreen("screen-confirm",2);
}
// blocca i campi estratti dall'MRZ (verificati coi check digit): non modificabili né cancellabili.
// Per il DNI/NIE spagnolo si estraggono e bloccano anche 2° cognome, tipo doc, n° soporte.
function lockConfirm(r){
  // Nome e cognomi restano MODIFICABILI: l'MRZ non li protegge con check-digit
  // (possibili errori OCR, es. "LGARCIA"). Si bloccano solo i campi verificati.
  // tutti i campi d'identità bloccati: la lettura e' confermata da CONFIRM frame identici.
  // Se qualcosa non torna, si torna indietro e si riscansiona (niente modifica manuale).
  ["i_nombre","i_ap1","i_ap2","i_ndoc"].forEach(id=>{ const e=$(id); e.readOnly=true; e.classList.add("locked"); });
  ["i_sexo","i_nac","i_dob"].forEach(id=>{ const e=$(id); e.disabled=true; e.classList.add("locked"); });
  const es=!!(r&&r.es);
  const td=$("i_tdoc"); td.disabled=es; td.classList.toggle("locked",es);
  const sp=$("i_soporte"); sp.readOnly=es; sp.classList.toggle("locked",es);
}

function validateComplete(){
  let ok=true;
  const set=(id,eid,cond,key)=>{ const el=$(id),er=$(eid);
    if(cond){ el.classList.add("bad"); er.textContent=tt(key); er.classList.add("show"); ok=false; }
    else { el.classList.remove("bad"); er.classList.remove("show"); } };
  set("i_calle","e_calle", !$("i_calle").value.trim(), "req_calle");
  set("i_cp","e_cp", !/^[0-9A-Za-z \-]{3,10}$/.test($("i_cp").value.trim()), "req_cp");
  set("i_ciudad","e_ciudad", !$("i_ciudad").value.trim(), "req_ciudad");
  set("i_tel","e_tel", !/^[0-9 ]{6,15}$/.test($("i_tel").value.trim()), "req_tel");
  set("i_email","e_email", !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test($("i_email").value.trim()), "req_email");
  // país obbligatorio
  if(!$("i_pais").value){ $("i_pais").classList.add("bad"); ok=false; } else $("i_pais").classList.remove("bad");
  // soporte: deve rispettare il formato richiesto dal Form (evita invii falliti in silenzio).
  // Se l'OCR avesse prodotto un valore non valido, sblocco il campo per la correzione manuale.
  if(["DNI","NIE"].includes($("i_tdoc").value)){
    const sp=$("i_soporte");
    if(!/^[A-Z][A-Z0-9]{8}$/.test(sp.value.trim())){
      sp.readOnly=false; sp.classList.remove("locked"); sp.classList.add("bad"); ok=false;
      $("h_soporte").textContent = LANG=="es"
        ? "Formato: 9 caracteres, 1ª letra MAYÚSCULA + 8 (ej: CFV153078). Corrígelo."
        : "Format: 9 chars, 1st UPPERCASE letter + 8 (e.g. CFV153078). Please fix.";
    } else sp.classList.remove("bad");
  }
  const r=$("i_rgpd"); if(!r.checked){ $("e_rgpd").textContent=tt("req_rgpd"); $("e_rgpd").classList.add("show"); ok=false; }
  else $("e_rgpd").classList.remove("show");
  return ok;
}
function collect(){
  const isoN=$("i_nac").value, isoP=$("i_pais").value;
  const cName=iso=>{ const c=COUNTRIES.find(x=>x[0]===iso); return c?(LANG=="es"?c[1]:c[2]):iso; };
  const prov = isoP==="ES" ? $("i_prov_sel").value : $("i_prov").value.trim();
  return {
    nombre:$("i_nombre").value.trim(),
    primer_apellido:$("i_ap1").value.trim(),
    segundo_apellido:$("i_ap2").value.trim(),
    apellidos:[$("i_ap1").value.trim(),$("i_ap2").value.trim()].filter(Boolean).join(" "),
    sexo:$("i_sexo").value,
    nacimiento:$("i_dob").value,
    nacionalidad:cName(isoN), nacionalidad_iso:isoN,
    tipo_documento:$("i_tdoc").value,
    numero_documento:$("i_ndoc").value.trim(),
    numero_soporte: ["DNI","NIE"].includes($("i_tdoc").value) ? $("i_soporte").value.trim() : "",
    direccion:$("i_calle").value.trim(),
    cp:$("i_cp").value.trim(),
    ciudad:$("i_ciudad").value.trim(),
    provincia:prov,
    pais:cName(isoP), pais_iso:isoP,
    telefono:($("i_pref").value+$("i_tel").value.trim().replace(/\s+/g,"")),
    email:$("i_email").value.trim(),
    rgpd:$("i_rgpd").checked
  };
}
function goReview(){
  const g=collect(); G.data=g;
  const rows=[["Nombre","nombre"],["Primer apellido","primer_apellido"],["Segundo apellido","segundo_apellido"],
   ["Sexo","sexo"],["Fecha nac.","nacimiento"],["Nacionalidad","nacionalidad"],
   ["Tipo doc.","tipo_documento"],["Nº documento","numero_documento"],["Nº soporte","numero_soporte"],
   ["Dirección","direccion"],["CP","cp"],["Ciudad","ciudad"],["Provincia","provincia"],["País","pais"],
   ["Teléfono","telefono"],["Email","email"]];
  $("rv_body").innerHTML=rows.filter(r=>g[r[1]]).map(r=>
    `<div class="row"><span class="k">${r[0]}</span><span class="v">${esc(g[r[1]])}</span></div>`).join("");
  showScreen("screen-review",4);
}
// mappa i dati raccolti sui campi (entry.ID) del Google Form esistente
function buildFormData(g){
  const p=new URLSearchParams();
  p.append("entry.972262734", g.nombre);
  p.append("entry.365280130", g.primer_apellido);
  if(g.segundo_apellido) p.append("entry.1333479033", g.segundo_apellido);
  p.append("entry.1281377465", g.sexo==="F"?"Mujer / woman":g.sexo==="M"?"Hombre / man":"Otro / other");
  if(g.nacimiento){ const [y,m,d]=g.nacimiento.split("-");
    p.append("entry.308685695_year",y);
    p.append("entry.308685695_month",String(+m));
    p.append("entry.308685695_day",String(+d)); }
  p.append("entry.852681434", g.nacionalidad);
  // documento: SOLO DNI/NIE spagnolo -> campo con validazione ES; tutto il resto
  // (passaporto + carte d'identita' straniere=OTRO) -> campo Passport (nessuna validazione ES)
  if(g.tipo_documento==="DNI"||g.tipo_documento==="NIE") p.append("entry.1740367436", g.numero_documento);
  else p.append("entry.547321197", g.numero_documento);
  if(g.numero_soporte) p.append("entry.364661363", g.numero_soporte);
  p.append("entry.1804243356", g.direccion);
  p.append("entry.394781062", g.cp);
  p.append("entry.325787827", g.ciudad);
  p.append("entry.506836919", g.pais);
  if(g.provincia) p.append("entry.977950693", g.provincia);
  p.append("entry.103869547", g.telefono);
  if(g.email) p.append("entry.1475220694", g.email);
  if(g.rgpd) p.append("entry.1921329789", "Acepto / I accept");
  return p;
}
async function send(){
  const g=G.data;
  $("rv_send").disabled=true;
  try{
    await fetch(FORM_ACTION,{method:"POST",mode:"no-cors",
      headers:{"Content-Type":"application/x-www-form-urlencoded"},
      body:buildFormData(g).toString()});
  }catch(e){ /* risposta opaca (no-cors): l'invio al Form avviene comunque */ }
  showScreen("screen-done",4);
}

/* ============ wiring ============ */
const FLAGS={es:"🇪🇸",en:"🇬🇧",fr:"🇫🇷",de:"🇩🇪",it:"🇮🇹"};
const langmenu=$("langmenu"), langbtn=$("langbtn");
function closeLangMenu(){ langmenu.setAttribute("hidden",""); langbtn.setAttribute("aria-expanded","false"); }
langbtn.onclick=(e)=>{ e.stopPropagation();
  if(langmenu.hasAttribute("hidden")){ langmenu.removeAttribute("hidden"); langbtn.setAttribute("aria-expanded","true"); }
  else closeLangMenu(); };
langmenu.querySelectorAll("button").forEach(b=>{ b.onclick=()=>{
  LANG=b.dataset.l; $("curflag").textContent=FLAGS[LANG];
  langmenu.querySelectorAll("button").forEach(x=>x.classList.toggle("on", x===b));
  closeLangMenu(); applyLang();
};});
document.addEventListener("click",()=>{ if(!langmenu.hasAttribute("hidden")) closeLangMenu(); });
[...langmenu.querySelectorAll("button")].find(b=>b.dataset.l==="es")?.classList.add("on");
$("startBtn").onclick=startScan;
$("cf_back").onclick=()=>showScreen("screen-scan",1);
$("cf_next").onclick=()=>{ refreshSoporte(); refreshCountryDeps(); showScreen("screen-complete",3); };
$("i_tdoc").onchange=refreshSoporte;
$("i_pais").onchange=refreshCountryDeps;
$("cp_back").onclick=()=>showScreen("screen-confirm",2);
$("cp_next").onclick=()=>{ if(validateComplete()) goReview(); };
$("rv_back").onclick=()=>showScreen("screen-complete",3);
$("rv_send").onclick=send;
applyLang(); refreshSoporte();
</script>
